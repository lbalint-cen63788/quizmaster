name: CI

on:
  push:
    branches:
      - master
      - devcontainer
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/scrumdojo/dev-quizmaster:v3
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quizmaster
          POSTGRES_PASSWORD: quizmaster
          POSTGRES_DB: quizmaster
        options: >-
          --health-cmd "pg_isready -U quizmaster -d quizmaster"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Install frontend dependencies and Playwright
        working-directory: specs
        run: pnpm ci:install

      - name: Type check & lint & format frontend
        working-directory: specs
        run: pnpm ci:code

      - name: Build frontend
        working-directory: specs
        run: pnpm ci:build

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test

      - name: Run end-to-end tests
        working-directory: specs
        run: pnpm ci:test:e2e
